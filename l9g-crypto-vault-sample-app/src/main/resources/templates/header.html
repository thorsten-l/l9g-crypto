<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
  <div th:fragment="head" th:remove="tag">
    <meta charset="UTF-8"></meta>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" ></meta>
    <!-- CSRF Tags -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"></link>
    <link th:rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}" ></link>
    <link th:rel="stylesheet" th:href="@{/css/flag-icons.min.css}" ></link>
    <link th:rel="stylesheet" th:href="@{/css/main.css}"></link>
  </div>

  <div th:fragment="header" th:remove="tag">
    <!--begin::Header-->
    <nav class="app-header navbar navbar-expand head-nav"> 
      <!--begin::Container-->
      <div class="container-fluid"> 
        <ul class="navbar-nav">
          <li class="nav-item"> 
            <a th:href="@{/}" class="nav-link"><i class="fa-solid fa-house-chimney" style="font-size: 1.5em"></i></a> 
          </li>
        </ul> 

        <div class="d-flex">
          <span class="navbar-text" style="margin-right: 1em">
            <a href="?lang=de"><span class="fi fi-de" th:classappend="${locale == 'de'} ? 'flag-selected' : ''"></span></a> |
            <a href="?lang=en"><span class="fi fi-gb" th:classappend="${locale == 'en'} ? 'flag-selected' : ''"></span></a>
          </span>

          <!--begin::End Navbar Links-->
          <div sec:authorize="isAuthenticated()">
            <ul class="navbar-nav ms-auto">

              <!--begin::User Menu Dropdown-->
              <li class="nav-item dropdown user-menu"> 
                <a href="#" class="nav-link dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown" aria-expanded="false" style=""> 
                  <i class="fa-solid fa-user" style="font-size: 1.5em"></i>
                </a>

                <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0 overflow-hidden shadow" style="min-width: 300px;"> 
                  <!--begin::User Image-->

                  <div sec:authorize="hasRole('ADMIN')" th:remove="tag">
                    <li class="user-header text-bg-danger text-center p-3"> 
                      <i class="fa-solid fa-user" style="font-size: 4em"></i>
                      <p class="mt-2 mb-0 fs-5 text-white">
                        <span th:text="${principal.fullName}" th:remove="tags"></span>
                      </p>
                      <small class="text-white">- Administrator -</small>
                    </li>
                    
                    <li class="p-2 bg-light">
                      <a class="btn btn-secondary w-100" th:href="@{/admin}">Administration</a>
                    </li>
                  </div>

                  <div sec:authorize="!hasRole('ADMIN')" th:remove="tag">
                    <li class="user-header text-bg-primary text-center p-3"> 
                      <i class="fa-solid fa-user" style="font-size: 4em"></i>
                      <p class="mt-2 mb-0 fs-5 text-white">
                        <span th:text="${principal.fullName}" th:remove="tags"></span>
                      </p>
                    </li> 
                  </div>

                  <!--end::User Image-->

                  <!--begin::Menu Body-->
                  <li class="user-footer p-2 bg-light border-top"> 
                    <form id="logoutForm" th:action="@{/logout}" method="post" style="display:inline;">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                      <button type="submit" class="btn btn-primary w-100">
                        Sign out
                      </button>
                    </form>
                  </li> 
                  <!--end::Menu Footer-->
                </ul>
              </li> 
              <!--end::User Menu Dropdown-->
            </ul> 
            <!--end::End Navbar Links-->
          </div> 
        </div> 
      </div> 
      <!--end::Container-->
    </nav> 
    <!--end::Header--> 
  </div>
</html>
